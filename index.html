<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Patina Sound System</title>
  <meta name="description" content="Patina Sound System — hi‑fi sound system, events, rentals." />
  <style>
    :root{
      --bg:#ffffff; --fg:#111111; --muted:#6b6b6b; --line:#e6e6e6;
      --max:1200px; --sidebar:320px; --pad:22px; --radius:6px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Helvetica, Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      --display: "Inter", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{ margin:0; font-family:var(--font); background:var(--bg); color:var(--fg); line-height:1.45; overflow-x:hidden; }
    a{ color:inherit; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .wrapper{ max-width:var(--max); margin:0 auto; display:grid; grid-template-columns: var(--sidebar) 1fr; min-height:100vh; }
    .sidebar{ position:sticky; top:0; height:100vh; border-right:1px solid var(--line); padding:var(--pad); display:flex; flex-direction:column; gap:18px; background:var(--bg); }

    .brand{ display:flex; align-items:flex-start; justify-content:flex-start; gap:14px; }

    /* Animated circular text logo */
    .rotLogo{ width:120px; height:120px; flex:0 0 120px; }
    .rotLogo svg{ width:100%; height:100%; display:block; }
    .rotLogo text{
      font-family: Arial Black, Impact, Helvetica, sans-serif;
      font-weight:900;
      font-size:12px;
      letter-spacing:1.5px;
      fill:var(--fg);
    }

    @keyframes spin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

    .rotLogo .ring{ transform-origin:50% 50%; animation: spin 14s linear infinite; }

    @media (prefers-reduced-motion: reduce){
      .rotLogo .ring{ animation:none; }
    }

    .logo{ font-weight:650; letter-spacing:0.2px; font-size:16px; line-height:1.15; }
    .logo small{ display:block; margin-top:8px; font-weight:500; color:var(--muted); font-size:12px; letter-spacing:0.7px; text-transform:uppercase; font-family:var(--mono); }

    .nav{ display:flex; flex-direction:column; gap:0; padding-top:14px; border-top:1px solid var(--line); }
    .nav a{ padding:10px 0; border-radius:0; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); text-decoration:none; }
    .nav a:hover{ text-decoration:none; opacity:0.85; }
    .nav a[aria-current="page"]{ font-weight:650; }
    .nav a span{ color:var(--muted); font-family:var(--mono); font-size:12px; }

    .about{ margin-top:auto; padding-top:16px; border-top:1px solid var(--line); color:var(--muted); font-size:12.5px; }
    .about strong{ color:var(--fg); font-weight:650; }
    .meta{ margin-top:10px; font-family:var(--mono); font-size:12px; color:var(--muted); display:flex; flex-wrap:wrap; gap:10px; }

    .content{ padding: calc(var(--pad) + 6px); min-width:0; }
    .header{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; }
    .h1{
      font-family:var(--display);
      font-size:22px;
      font-weight:600;
      letter-spacing:-0.2px;
      margin:0;
    }
    .sub{ margin:10px 0 0 0; color:var(--muted); max-width: 72ch; font-size:13.5px; }

    .hero-image{
      width:100%;
      margin:28px 0 34px 0;
    }
    .hero-image img{
      width:100%;
      height:auto;
      display:block;
      filter:none;
    }

    .kicker{
      font-family:var(--mono);
      font-size:11.5px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .card{ border:1px solid var(--line); border-radius:0; padding:0; background:transparent; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-top:18px; }
    .hr{ height:1px; background:var(--line); margin:14px 0; }

    .list{ display:flex; flex-direction:column; gap:10px; }
    .item{ display:flex; gap:14px; align-items:flex-start; justify-content:space-between; padding:12px 0; border-radius:0; border:0; border-bottom:1px solid var(--line); }
    .item:hover{ background:transparent; }
    .item .title{
      font-family:var(--display);
      font-weight:600;
      letter-spacing:-0.1px;
    }
    .item .right{ text-align:right; color:var(--muted); font-family:var(--mono); font-size:12px; min-width: 110px; }

    .btn{ display:inline-flex; align-items:center; gap:8px; padding:0; border-radius:0; border:0; background:transparent; cursor:pointer; font-weight:650; text-decoration:underline; text-underline-offset:3px; }
    .btn:hover{ opacity:0.85; }

    .form{ display:grid; gap:10px; margin-top:10px; }
    .input, .textarea{ width:100%; max-width:100%; min-width:0; display:block; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font:inherit; }
    .textarea{ min-height:120px; resize:vertical; }

    .footer{ margin-top:22px; padding-top:16px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }

    /* Mobile */
    .mobileTop{ display:none; position:sticky; top:0; z-index:10; background:var(--bg); border-bottom:1px solid var(--line); padding:12px var(--pad); }
    .mobileTop .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .mobileTitle{ font-weight:700; letter-spacing:0.2px; }
    .drawer{ display:none; padding:0 var(--pad) 14px var(--pad); }
    .drawer.open{ display:block; }

    @media (max-width: 920px){
      .wrapper{ grid-template-columns: 1fr; }
      .sidebar{ display:none; }
      .mobileTop{ display:block; }
      .content{ padding: 18px var(--pad); }
      .grid{ grid-template-columns: 1fr; }
    }

    /* Page routing */
    [data-page]{ display:none; }
    [data-page].active{ display:block; }
  

    /* Map Modal */
    .modal{ position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:100; }
    .modal.open{ display:flex; }
    .modal-content{ width:90%; max-width:900px; background:#fff; padding:12px; border:1px solid var(--line); }
    .modal iframe{ width:100%; height:500px; border:0; }
    .modal-close{ text-align:right; font-size:12px; cursor:pointer; margin-bottom:6px; }

  </style>
</head>
